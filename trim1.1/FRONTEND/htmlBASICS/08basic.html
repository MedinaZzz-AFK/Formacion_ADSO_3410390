<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Tabla ejercicio</title>
      <style>
        table{
            width: 100%;
            font-size: 0.8rem;
            color: rgb(187, 41, 200);
            border-collapse: collapse;
            tr{
                th{
                    background-color: rgb(238, 218, 235);
                }
                td{
                    background-color: rgba(0, 0, 0, 0.707);
                    padding: 0.3rem 0.1rem;
                }
            }
            tr:nth-child(even) td{
                background-color: aliceblue;
            }
            tfoot{
                td{
                background-color: rgb(164, 149, 149);
                color: black;
                text-align: center;
                }
            }
        }
    </style>
</head>
<body>
     <section>
        <table>
            <thead>
                <tr>
                    <th colspan="6">Labrador</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td >Pug</td>
                    <td colspan="5">Grande</td>
                </tr>
                <tr>
                    <td>Husky</td>
                    <td>Mediano</td>
                    <td colspan="4">Blanco y gris</td>
                </tr>
                <tr>
                    <td>Chihuahua</td>
                    <td>Pequeño</td>
                    <td>Café</td>
                    <td colspan="3">Juguetón</td>
                 
                </tr>
                <tr>
                    <td>Golden Retriever</td>
                    <td>Grande</td>
                    <td>Dorado</td>
                    <td>Amigable</td>
                    <td colspan="2">12 años</td>
                </tr>
                <tr>
                    <td>Pastor Aleman</td>
                    <td>Grande</td>
                    <td>Negro y café</td>
                    <td>Inteligente</td>
                    <td>10 años</td>
                    <td>Leal</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="5">Total adoptados</td>
                    <td>5</td>
                </tr>
            </tfoot>
        </table>
    </section>
</body>
</html>
