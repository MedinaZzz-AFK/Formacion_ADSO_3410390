<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>09.Scripts</h1>
        <h2>Etiqueta que permita agregar codigo en JavaScript</h2>
    </header>
    <section>
        <h2>Bienvenid@: <mark id="usuario">Invitado</mark></h2>
    </section>
    <script>
        //MANEJO DE VARIABLES
        let user = "vero";
        user = prompt("Cuál es su nombre?");
        if(user){
            let usuario = document.getElementById("usuario");
            usuario.innerText = user;
        }
        usuario = document.getElementById(usuario);
        usuario.innerText = user;
    </script>
</body>
</html>
